<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>霓虹夜航 · 3D 无限赛车</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap');

  :root{
    --pink: #ff2e88;
    --cyan: #08d9d6;
    --gold: #ffcf4d;
    --deep: #150a26;
    --text: #f4f1ff;
    --muted: #9a8fc2;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--deep);
    color: var(--text);
    font-family:'Inter', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #canvas-host{ position:fixed; inset:0; }
  canvas{ display:block; }
  .mono{ font-family:'Orbitron', sans-serif; }

  .hud{ position:fixed; z-index:6; pointer-events:none; }
  .hud *{ pointer-events:auto; }

  #hud-top{
    top:18px; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: 0 22px;
  }
  .stat-card{
    background: rgba(21,10,38,0.6);
    border: 1px solid rgba(8,217,214,0.35);
    padding: 8px 16px;
    backdrop-filter: blur(3px);
    min-width: 110px;
  }
  .stat-card .label{ font-size:10px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
  .stat-card .value{ font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:var(--gold); }
  .stat-card.right .value{ color: var(--pink); text-align:right; }
  .stat-card.right{ text-align:right; }

  #speed-wrap{
    position:absolute; bottom: 22px; left:50%; transform: translateX(-50%);
    width: 220px; text-align:center;
  }
  #speed-bar-bg{
    width:100%; height:6px; background: rgba(255,255,255,0.08);
    border-radius: 4px; overflow:hidden; margin-top:4px;
  }
  #speed-bar{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    transition: width .1s linear;
  }

  .overlay{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background: radial-gradient(circle at 50% 40%, rgba(255,46,136,0.12), rgba(10,5,20,0.86));
    backdrop-filter: blur(2px);
    text-align:center; padding: 20px;
  }
  .overlay h1{
    font-family:'Orbitron',sans-serif; font-weight:900; font-size: clamp(28px, 6vw, 48px);
    margin:0 0 8px 0; letter-spacing:.06em;
    color: var(--text);
    text-shadow: 0 0 18px rgba(255,46,136,0.6), 0 0 40px rgba(8,217,214,0.25);
  }
  .overlay p{ color: var(--muted); font-size:13px; line-height:1.8; max-width:420px; margin: 6px 0 22px; }
  .overlay .score-big{ font-family:'Orbitron',sans-serif; font-size:15px; color:var(--gold); margin-bottom:4px;}
  .btn{
    font-family:'Orbitron',sans-serif; font-size:14px; letter-spacing:.08em;
    background: linear-gradient(90deg, var(--pink), #a63cff);
    color:#fff; border:none; padding: 13px 34px; cursor:pointer;
    text-transform:uppercase; border-radius: 2px;
    box-shadow: 0 0 20px rgba(255,46,136,0.4);
  }
  .btn:hover{ filter: brightness(1.12); }
  .hidden{ display:none !important; }

  #touch-zones{
    position:fixed; inset:0; z-index:5; display:flex;
  }
  #touch-zones div{ flex:1; }

  @media (min-width: 720px){
    #touch-zones{ display:none; }
  }
</style>
</head>
<body>

<div id="canvas-host"></div>

<div id="touch-zones">
  <div id="zone-left"></div>
  <div id="zone-right"></div>
</div>

<div class="hud" id="hud-top">
  <div class="stat-card">
    <div class="label">Score</div>
    <div class="value" id="hud-score">0</div>
  </div>
  <div class="stat-card right">
    <div class="label">Best</div>
    <div class="value" id="hud-best">0</div>
  </div>
</div>

<div class="hud" id="speed-wrap">
  <div class="label mono" style="font-size:10px; color:var(--muted); letter-spacing:.14em;">SPEED</div>
  <div id="speed-bar-bg"><div id="speed-bar"></div></div>
</div>

<div class="overlay" id="screen-start">
  <h1>霓虹夜航</h1>
  <p>← → / A D 切换车道 &nbsp;·&nbsp; ↑ 加速 &nbsp;·&nbsp; ↓ 减速<br>
     手机端点击屏幕左右两侧切换车道<br>
     躲避锥桶与来车，收集金色棱晶加分</p>
  <button class="btn" id="btn-start">开始游戏</button>
</div>

<div class="overlay hidden" id="screen-over">
  <h1 style="color:var(--pink);">碰撞终止</h1>
  <div class="score-big">本次得分 <span id="final-score">0</span></div>
  <p id="new-best-msg" style="color:var(--gold); display:none;">— 新纪录 —</p>
  <button class="btn" id="btn-restart">再来一次</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.164.1/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   Setup
============================================================ */
const host = document.getElementById('canvas-host');
const LANE_X = [-2.6, 0, 2.6];
const HIGHSCORE_KEY = 'neon_racer_highscore';

const scene = new THREE.Scene();

// synthwave sky gradient
function makeSkyTexture(){
  const c = document.createElement('canvas'); c.width = 2; c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,256);
  g.addColorStop(0, '#150a26');
  g.addColorStop(0.45, '#3a1657');
  g.addColorStop(0.72, '#c23e7d');
  g.addColorStop(1, '#ffb15e');
  ctx.fillStyle = g; ctx.fillRect(0,0,2,256);
  return new THREE.CanvasTexture(c);
}
scene.background = makeSkyTexture();
scene.fog = new THREE.Fog(0x2a1246, 30, 170);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 4.6, 9);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
host.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// lighting
scene.add(new THREE.AmbientLight(0x6a4a9a, 1.1));
const moon = new THREE.DirectionalLight(0x9fd8ff, 0.5);
moon.position.set(-10, 20, -10);
scene.add(moon);
const headlight = new THREE.PointLight(0xffe9b0, 2, 18, 2);
headlight.position.set(0, 1.4, 2.5);
scene.add(headlight);

// synthwave sun
const sunTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128,128,10,128,128,128);
  g.addColorStop(0, 'rgba(255,206,120,0.95)');
  g.addColorStop(0.5, 'rgba(255,90,140,0.55)');
  g.addColorStop(1, 'rgba(255,90,140,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
})();
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:sunTex, transparent:true, depthWrite:false }));
sunSprite.scale.set(46,46,1);
sunSprite.position.set(0, 14, -140);
scene.add(sunSprite);

// distant neon grid mountains (decorative wireframe plane)
const gridGeo = new THREE.PlaneGeometry(300, 200, 30, 20);
const gridMat = new THREE.MeshBasicMaterial({ color:0xff2e88, wireframe:true, transparent:true, opacity:0.18 });
const gridPlane = new THREE.Mesh(gridGeo, gridMat);
gridPlane.rotation.x = -Math.PI/2;
gridPlane.position.set(0, -0.05, -80);
scene.add(gridPlane);

/* ============================================================
   Road (recycled segments)
============================================================ */
const SEG_LEN = 20;
const SEG_COUNT = 10;
const roadSegs = [];
const roadMat = new THREE.MeshStandardMaterial({ color:0x1a1030, roughness:0.9 });
const markMat = new THREE.MeshBasicMaterial({ color:0x08d9d6 });

for (let i=0;i<SEG_COUNT;i++){
  const g = new THREE.Group();
  const road = new THREE.Mesh(new THREE.PlaneGeometry(9, SEG_LEN), roadMat);
  road.rotation.x = -Math.PI/2;
  g.add(road);
  // lane markers
  [-1.3, 1.3].forEach(lx => {
    for (let m=0;m<4;m++){
      const mark = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 1.6), markMat);
      mark.rotation.x = -Math.PI/2;
      mark.position.set(lx, 0.01, -SEG_LEN/2 + m*(SEG_LEN/4) + 1);
      g.add(mark);
    }
  });
  // side barriers (glow strips)
  [-4.6, 4.6].forEach(sx => {
    const barrier = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, SEG_LEN), new THREE.MeshBasicMaterial({ color: 0xff2e88 }));
    barrier.position.set(sx, 0.25, 0);
    g.add(barrier);
  });
  g.position.z = -i * SEG_LEN;
  scene.add(g);
  roadSegs.push(g);
}

/* ============================================================
   Car
============================================================ */
function buildCar(bodyColor){
  const car = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 3), new THREE.MeshStandardMaterial({ color: bodyColor, roughness:0.35, metalness:0.3 }));
  body.position.y = 0.55;
  car.add(body);
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.45, 1.4), new THREE.MeshStandardMaterial({ color: 0x0d0d16, roughness:0.2 }));
  cabin.position.set(0, 0.98, -0.15);
  car.add(cabin);
  const wheelGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.3, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
  [[-0.85,0.32,1.05],[0.85,0.32,1.05],[-0.85,0.32,-1.05],[0.85,0.32,-1.05]].forEach(p=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0],p[1],p[2]);
    car.add(w);
  });
  const lightGeo = new THREE.BoxGeometry(0.3,0.15,0.1);
  const lightMat = new THREE.MeshBasicMaterial({ color:0xffe9b0 });
  [-0.55, 0.55].forEach(lx=>{
    const l = new THREE.Mesh(lightGeo, lightMat);
    l.position.set(lx, 0.55, 1.52);
    car.add(l);
  });
  return car;
}
const player = buildCar(0x08d9d6);
scene.add(player);

/* ============================================================
   Game state
============================================================ */
const state = {
  playing:false,
  lane: 1,
  targetX: LANE_X[1],
  speed: 26,
  baseSpeed: 26,
  maxSpeed: 62,
  boosting:false,
  braking:false,
  elapsed: 0,
  distanceScore: 0,
  coinScore: 0,
  spawnTimer: 0,
  spawnInterval: 1.15,
  obstacles: [], // {mesh, type, lane}
};

const scoreEl = document.getElementById('hud-score');
const bestEl = document.getElementById('hud-best');
const speedBar = document.getElementById('speed-bar');
const screenStart = document.getElementById('screen-start');
const screenOver = document.getElementById('screen-over');
const finalScoreEl = document.getElementById('final-score');
const newBestMsg = document.getElementById('new-best-msg');

let bestScore = parseInt(localStorage.getItem(HIGHSCORE_KEY) || '0', 10);
bestEl.textContent = bestScore;

function totalScore(){ return Math.floor(state.distanceScore) + state.coinScore; }

/* ---------- obstacle / coin factory ---------- */
const coinGeo = new THREE.OctahedronGeometry(0.4, 0);
const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcf4d, emissive:0x664400, roughness:0.3, metalness:0.6 });
const coneGeo = new THREE.ConeGeometry(0.45, 0.9, 10);
const coneMat = new THREE.MeshStandardMaterial({ color: 0xff5533, roughness:0.6 });
const rivalColors = [0xa63cff, 0x36d17b, 0xff8b3d];

function spawnObstacle(){
  const lane = Math.floor(Math.random()*3);
  const roll = Math.random();
  let mesh, type;
  if (roll < 0.32){
    mesh = new THREE.Mesh(coinGeo, coinMat);
    mesh.position.y = 0.9;
    type = 'coin';
  } else if (roll < 0.68){
    mesh = new THREE.Mesh(coneGeo, coneMat);
    mesh.position.y = 0.45;
    type = 'cone';
  } else {
    mesh = buildCar(rivalColors[Math.floor(Math.random()*rivalColors.length)]);
    type = 'car';
  }
  mesh.position.x = LANE_X[lane];
  mesh.position.z = -130 - Math.random()*20;
  scene.add(mesh);
  state.obstacles.push({ mesh, type, lane });
}

function clearObstacles(){
  state.obstacles.forEach(o => scene.remove(o.mesh));
  state.obstacles = [];
}

/* ---------- controls ---------- */
function setLane(delta){
  if (!state.playing) return;
  state.lane = Math.min(2, Math.max(0, state.lane + delta));
  state.targetX = LANE_X[state.lane];
}
window.addEventListener('keydown', (e) => {
  if (['ArrowLeft','a','A'].includes(e.key)) setLane(-1);
  if (['ArrowRight','d','D'].includes(e.key)) setLane(1);
  if (['ArrowUp','w','W'].includes(e.key)) state.boosting = true;
  if (['ArrowDown','s','S'].includes(e.key)) state.braking = true;
  if (e.key === 'Enter' || e.key === ' '){
    if (!state.playing) startGame();
  }
});
window.addEventListener('keyup', (e) => {
  if (['ArrowUp','w','W'].includes(e.key)) state.boosting = false;
  if (['ArrowDown','s','S'].includes(e.key)) state.braking = false;
});
document.getElementById('zone-left').addEventListener('pointerdown', () => setLane(-1));
document.getElementById('zone-right').addEventListener('pointerdown', () => setLane(1));

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);

/* ---------- game flow ---------- */
function startGame(){
  clearObstacles();
  state.playing = true;
  state.lane = 1;
  state.targetX = LANE_X[1];
  state.speed = state.baseSpeed;
  state.elapsed = 0;
  state.distanceScore = 0;
  state.coinScore = 0;
  state.spawnTimer = 0;
  state.spawnInterval = 1.15;
  player.position.set(0,0,0);
  screenStart.classList.add('hidden');
  screenOver.classList.add('hidden');
}

function endGame(){
  state.playing = false;
  const score = totalScore();
  finalScoreEl.textContent = score;
  if (score > bestScore){
    bestScore = score;
    localStorage.setItem(HIGHSCORE_KEY, String(bestScore));
    bestEl.textContent = bestScore;
    newBestMsg.style.display = 'block';
  } else {
    newBestMsg.style.display = 'none';
  }
  screenOver.classList.remove('hidden');
}

/* ============================================================
   Loop
============================================================ */
const clock = new THREE.Clock();

function updateRoad(dz){
  roadSegs.forEach(seg => {
    seg.position.z += dz;
    if (seg.position.z > 20){
      seg.position.z -= SEG_COUNT * SEG_LEN;
    }
  });
}

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state.playing){
    state.elapsed += dt;

    // difficulty ramp
    state.baseSpeed = Math.min(state.maxSpeed, 26 + state.elapsed*0.7);
    let targetSpeed = state.baseSpeed;
    if (state.boosting) targetSpeed += 16;
    if (state.braking) targetSpeed -= 12;
    targetSpeed = Math.max(12, targetSpeed);
    state.speed += (targetSpeed - state.speed) * Math.min(1, dt*3);

    state.distanceScore += state.speed * dt * 0.5;
    state.spawnInterval = Math.max(0.45, 1.15 - state.elapsed*0.01);

    // move car laterally
    player.position.x += (state.targetX - player.position.x) * Math.min(1, dt*6);
    player.rotation.z = (state.targetX - player.position.x) * -0.15;
    headlight.position.x = player.position.x;

    // scroll road
    const dz = state.speed * dt;
    updateRoad(dz);
    gridPlane.position.z += dz * 0.6;
    if (gridPlane.position.z > 20) gridPlane.position.z -= 60;

    // spawn
    state.spawnTimer += dt;
    if (state.spawnTimer > state.spawnInterval){
      state.spawnTimer = 0;
      spawnObstacle();
    }

    // update obstacles
    for (let i = state.obstacles.length - 1; i >= 0; i--){
      const o = state.obstacles[i];
      o.mesh.position.z += dz;
      if (o.type === 'coin'){
        o.mesh.rotation.y += dt*4;
        o.mesh.position.y = 0.9 + Math.sin(state.elapsed*4 + i)*0.08;
      }
      // collision window near the car
      if (o.mesh.position.z > -0.6 && o.mesh.position.z < 1.6 && !o.resolved){
        const sameLane = Math.abs(o.mesh.position.x - player.position.x) < 1.1;
        if (sameLane){
          o.resolved = true;
          if (o.type === 'coin'){
            state.coinScore += 10;
            scene.remove(o.mesh);
            state.obstacles.splice(i,1);
            continue;
          } else {
            endGame();
          }
        }
      }
      if (o.mesh.position.z > 12){
        scene.remove(o.mesh);
        state.obstacles.splice(i,1);
      }
    }

    // camera follow with slight speed sway
    camera.position.x += (player.position.x*0.6 - (camera.position.x - 0)) * dt*3;
    camera.position.y = 4.6 + Math.sin(state.elapsed*8)*0.02;
    camera.lookAt(player.position.x*0.4, 1.2, -12);

    scoreEl.textContent = totalScore();
    speedBar.style.width = Math.min(100, (state.speed/state.maxSpeed)*100) + '%';
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
